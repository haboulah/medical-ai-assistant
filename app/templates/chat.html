<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI Assistant - Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0d7c66;
            --primary-dark: #095d4b;
            --primary-light: #e6f7f2;
            --bg: #f5f7fa;
            --user-bubble: #0d7c66;
            --user-text: #fff;
            --ai-bubble: #fff;
            --ai-border: #e0e8ef;
            --text: #1a2332;
            --text-muted: #6b7a8d;
            --shadow: 0 2px 12px rgba(13,124,102,0.08);
            --radius: 16px;
            --radius-sm: 10px;
        }
        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 40px rgba(0,0,0,0.06);
            position: relative;
        }

        /* Header */
        .header {
            padding: 18px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .header .sub {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 1px;
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .messages:empty::after {
            content: 'Décris tes symptômes ci-dessous pour une analyse pré-diagnostique.';
            display: block;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 40px;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* Chat bubbles */
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.55;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bubble.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }
        .bubble.ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }
        .bubble .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .bubble.user .time { color: rgba(255,255,255,0.7); }

        /* Medical result cards inside bubbles */
        .med-card {
            margin: 8px 0;
            padding: 10px 12px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary);
        }
        .med-card:first-child { margin-top: 4px; }
        .med-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .med-text {
            font-size: 13.5px;
            color: var(--text);
            line-height: 1.5;
        }
        .symptom-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }
        .symptom-tag {
            background: white;
            color: var(--primary-dark);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(13,124,102,0.2);
        }
        .risk-tag {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .risk-tag.LOW { background: #e6f7e6; color: #1a7d36; }
        .risk-tag.MEDIUM { background: #fff3e0; color: #cc6b00; }
        .risk-tag.HIGH { background: #fce4ec; color: #c62828; }
        .meta-line {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }
        .meta-line .dot { width: 4px; height: 4px; background: #ccc; border-radius: 50%; }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            display: none;
            align-items: center;
            gap: 6px;
            padding: 14px 18px;
            background: var(--ai-bubble);
            border: 1px solid var(--ai-border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
        }
        .typing.active { display: flex; }
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: #fff;
            border-top: 1px solid #eef2f6;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            border: 2px solid #e4e9f0;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.4;
            transition: border-color 0.2s;
            outline: none;
        }
        .input-area textarea:focus { border-color: var(--primary); }
        .input-area button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-area button:hover { background: var(--primary-dark); }
        .input-area button:active { transform: scale(0.92); }
        .input-area button:disabled { background: #c5ced9; cursor: not-allowed; transform: none; }
        .input-area .char-count {
            position: absolute;
            right: 80px;
            bottom: 24px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Error banner */
        .error-banner {
            display: none;
            padding: 10px 16px;
            background: #fef2f2;
            color: #b91c1c;
            font-size: 13px;
            border-top: 1px solid #fecaca;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .error-banner.active { display: flex; }

        /* Scrollbar */
        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #d0d8e3; border-radius: 10px; }

        @media (max-width: 500px) {
            .app { max-width: 100%; box-shadow: none; }
            .messages { padding: 16px; }
            .bubble { max-width: 92%; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-icon">🏥</div>
        <div>
            <h1>Assistant Médical</h1>
            <div class="sub">Pré-diagnostic par IA — Agents spécialisés</div>
        </div>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="errorBanner">
        <span>⚠️</span>
        <span id="errorText"></span>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Typing indicator -->
    <div class="typing" id="typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
    </div>

    <!-- Input -->
    <div class="input-area">
        <textarea id="input" rows="1" placeholder="Décris tes symptômes..." maxlength="2000"></textarea>
        <button id="sendBtn" onclick="sendMessage()" title="Envoyer (Cmd+Enter)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typing');
    const errorBanner = document.getElementById('errorBanner');
    const errorText = document.getElementById('errorText');

    let isLoading = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Send on Cmd+Enter / Ctrl+Enter
    inputEl.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    function addMessage(text, role, time) {
        const div = document.createElement('div');
        div.className = 'bubble ' + role;
        div.innerHTML = text +
            '<div class="time">' + (time || new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})) + '</div>';
        messagesEl.appendChild(div);
        scrollToBottom();
        return div;
    }

    function addUserMessage(text) {
        return addMessage(escapeHtml(text), 'user');
    }

    function formatMedResult(data) {
        var parts = [];

        // Symptoms
        if (data.symptoms && data.symptoms.symptoms && data.symptoms.symptoms.length) {
            var tags = data.symptoms.symptoms.map(function(s) {
                return '<span class="symptom-tag">' + escapeHtml(s) + '</span>';
            }).join('');
            parts.push(
                '<div class="med-card">' +
                '<div class="med-label">🧬 Symptomes detectes</div>' +
                '<div class="symptom-tags">' + tags + '</div>' +
                '</div>'
            );
        }

        // Risk
        if (data.risk) {
            var level = data.risk.level || 'LOW';
            parts.push(
                '<div class="med-card">' +
                '<div class="med-label">⚠️ Niveau de risque</div>' +
                '<div><span class="risk-tag ' + level + '">' + level + '</span></div>' +
                (data.risk.justification ? '<div class="med-text" style="margin-top:6px;">' + escapeHtml(data.risk.justification) + '</div>' : '') +
                '</div>'
            );
        }

        // Medical advice
        if (data.medical_advice && data.medical_advice.advice) {
            parts.push(
                '<div class="med-card">' +
                '<div class="med-label">💊 Conseil medical</div>' +
                '<div class="med-text">' + escapeHtml(data.medical_advice.advice) + '</div>' +
                '</div>'
            );
        }

        // Disclaimers
        if (data.disclaimer) {
            parts.push(
                '<div class="med-card" style="background:#fff8e1;border-left-color:#ffc107;">' +
                '<div class="med-label">⚠️ Avertissement</div>' +
                '<div class="med-text">' + escapeHtml(data.disclaimer) + '</div>' +
                '</div>'
            );
        }

        // Error
        if (data.error) {
            parts.push(
                '<div class="med-card" style="background:#fef2f2;border-left-color:#dc2626;">' +
                '<div class="med-label">❌ Erreur</div>' +
                '<div class="med-text">' + escapeHtml(data.error) + '</div>' +
                '</div>'
            );
        }

        // Monitoring metadata
        if (data.monitoring) {
            var dur = (data.monitoring.duration_ms || 0).toFixed(0);
            var agents = (data.monitoring.agents_executed || []).length;
            var status = data.monitoring.status || 'success';
            parts.push(
                '<div class="meta-line">' +
                '⏱️ ' + dur + ' ms <span class="dot"></span> ' +
                '🤖 ' + agents + ' agents <span class="dot"></span> ' +
                '✅ ' + status +
                '</div>'
            );
        }

        return parts.join('');
    }

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        var msg = inputEl.value.trim();
        if (!msg || isLoading) return;

        errorBanner.classList.remove('active');

        // Add user message
        addUserMessage(msg);
        inputEl.value = '';
        inputEl.style.height = 'auto';

        // Show typing indicator
        typingEl.classList.add('active');
        isLoading = true;
        sendBtn.disabled = true;
        scrollToBottom();

        try {
            var res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });

            if (!res.ok) {
                var errData = await res.json().catch(function() { return null; });
                throw new Error(errData && errData.detail ? errData.detail : 'Erreur ' + res.status);
            }

            var data = await res.json();
            var html = formatMedResult(data);
            addMessage(html, 'ai');

        } catch (err) {
            errorText.textContent = err.message || 'Erreur de connexion';
            errorBanner.classList.add('active');
            addMessage('❌ **Erreur** : ' + escapeHtml(err.message || 'Connexion perdue'), 'ai');
        } finally {
            typingEl.classList.remove('active');
            isLoading = false;
            sendBtn.disabled = false;
            scrollToBottom();
        }
    }

    // Focus input on load
    inputEl.focus();
</script>
</body>
</html>
