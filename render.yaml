# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: medical-ai-assistant
    env: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/haboulah/medical-ai-assistant
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false  # set manually in Render dashboard
      - key: APP_NAME
        value: "Medical AI Assistant"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "10000"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./data/medical_ai.db"
      - key: DEBUG
        value: "false"
