# Render deployment configuration
# https://render.com/docs/deploy-bluezprint

services:
  - type: web
    name: medical-ai-assistant
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
        required: true
      - key: APP_NAME
        value: Medical AI Assistant
      - key: APP_VERSION
        value: 1.0.0
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/medical_ai.db
